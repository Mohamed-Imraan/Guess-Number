<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky_game</title>
    <link rel="icon" href="https://img.icons8.com/doodle/48/controller--v1.png" />

</head>

<body>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #42e695, #f9f871);
            background-size: 400% 400%;
            background-position: center;
            animation: gradient 15s ease infinite
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h1 {
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: rgb(14, 13, 13);
            margin-top: 10px;
            background-color: rgba(228, 160, 205, 0.2);


        }

        #card {
            background-color: rgba(365, 365, 375, 0.2);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 400px;
        }

        #guessnumber {
            padding: 20px;
            font-size: 16px;
            border-radius: 5px;
            border: solid 2px palevioletred;
            margin-right: 10px;
        }

        #result {
            text-align: center;
            font-family: "bold", sans-serif;
            color: #0a0008;
            font-size: 20px;
            margin: 10px;
            background-color: #809c8f;
            border-radius: 2px;
        }

        .btn {
            background-color: aqua;
            color: black;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            border: outset 2px outset #fff;
        }

        .btn:hover {
            background-color: #ff6ec4;
        }

        p {
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: #fff;
            font-size: 18px;
            "

        }

        #score {
            text-align: center;
            font-family: 'Arial', sans-serif;
            color: #1e0441;
            margin: 20px;
            padding: 10px;
            border: solid 2px #4d8ac4;
            background-color: rgb(142, 160, 214);
            border-radius: 50px;
            width: fit-content;

        }
        .input {
            display: flex;
            justify-content: center;
            margin: 10px;
            border: solid 2px #fff;
            padding: 20px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.2);
        }

    </style>
    
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
        <div id="card">
            <h1>Welcome to the Lucky Game 🕹️🎮🎲</h1>
            <p>Try to guess the lucky number between 1 and 10.</p>
            <div class="input">
                <input id="guessnumber" placeholder="Enter your number">
                <button class="btn" onclick="check()">Check</button>
            </div>
            <span id="result">You are Wrong / Right 🤩</span><br>
            <h3 id="score">
                <bold>Score:</bold>10
            </h3>
        </div>
    </div>

    <script>
        // selecting input box and paragraph
        var guessnumber = document.getElementById("guessnumber");
        var result = document.getElementById("result");
        var score = document.getElementById("score");

        var randomNumber = Math.floor(Math.random() * 10) + 1;
        var totalscore = 10;

        function check() {
            var enterednumber = guessnumber.value;

            if (randomNumber == enterednumber) {
                console.log("Right");
                result.textContent = '👏🏻 You guessed the lucky number 🎉';
                result.style.color = 'darkgreen';
                alert("Congrats👏🏻 You guessed it right 🎉 You won..🏆");
            }
            else {
                totalscore = totalscore - 1;
                score.textContent = "Score: " + totalscore;
                result.textContent = `Wrong guess! 👾 Try again 🙅🏻‍♂️`;
                result.style.color = 'darkred';
            }
        }
    </script>

</body>

</html>
</body>

</html>
